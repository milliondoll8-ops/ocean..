<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Infinity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #010a13; --blue: #0077be; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        header { padding: 20px; display: flex; justify-content: flex-end; gap: 10px; }
        .lang-btn { background: none; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; padding: 5px 10px; border-radius: 5px; }
        .container { padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { font-size: 3rem; text-shadow: 0 0 20px var(--blue); margin: 10px 0; }
        .motto { font-style: italic; color: var(--accent); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin: 30px 0; }
        .card { border: 1px solid var(--blue); padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--blue); }
        .price { font-size: 1.4rem; font-weight: bold; color: var(--accent); display: block; }
        .btn { background: var(--blue); color: white; border: none; padding: 20px 60px; font-size: 1.4rem; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px var(--blue); }
        .btn:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent); }
        #status { margin: 15px; font-weight: bold; }
        .ref-box { margin-top: 30px; padding: 20px; border: 1px dashed var(--accent); display: none; border-radius: 10px; }
        .copy-btn { background: var(--accent); color: black; border: none; padding: 5px 15px; margin-left: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <button class="lang-btn" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
</header>

<div class="container">
    <h1 id="title">OCEAN INFINITY</h1>
    <p class="motto" id="motto">Семья — это сила Океана</p>
    <p id="status" style="color: #ff4d4d;">Кошелек не подключен</p>

    <div class="grid">
        <div class="card">Lvl 1<span class="price">$10</span></div>
        <div class="card">Lvl 2<span class="price">$20</span></div>
        <div class="card">Lvl 3<span class="price">$30</span></div>
        <div class="card">Lvl 4<span class="price">$45</span></div>
        <div class="card">Lvl 5<span class="price">$60</span></div>
        <div class="card">Lvl 6<span class="price">$80</span></div>
        <div class="card">Lvl 7<span class="price">$100</span></div>
        <div class="card">Lvl 8<span class="price">$140</span></div>
        <div class="card">Lvl 9<span class="price">$180</span></div>
        <div class="card">Lvl 10<span class="price">$240</span></div>
        <div class="card">Lvl 11<span class="price">$300</span></div>
        <div class="card">Lvl 12<span class="price">$380</span></div>
        <div class="card">Lvl 13<span class="price">$480</span></div>
        <div class="card">Lvl 14<span class="price">$600</span></div>
        <div class="card">Lvl 15<span class="price">$750</span></div>
    </div>

    <button class="btn" onclick="connectAndJoin()" id="mainBtn">ВСТУПИТЬ В СЕМЬЮ</button>

    <div id="refBox" class="ref-box">
        <span id="refText">Ваша ссылка:</span>
        <span id="refLink" style="color: var(--accent); word-break: break-all;"></span>
        <button class="copy-btn" onclick="copyRef()" id="copyBtn">Копировать</button>
    </div>
</div>

<script>
    const translations = {
        ru: { motto: "Семья — это сила Океана", btn: "ВСТУПИТЬ В СЕМЬЮ", status: "Подключен: ", ref: "Ваша ссылка:", copy: "Копировать", alert: "Ссылка скопирована!" },
        en: { motto: "Family is the Ocean's power", btn: "JOIN THE FAMILY", status: "Connected: ", ref: "Your link:", copy: "Copy", alert: "Link copied!" },
        fr: { motto: "La famille est la force de l'Océan", btn: "REJOINDRE LA FAMILLE", status: "Connecté: ", ref: "Votre lien:", copy: "Copier", alert: "Lien copié!" }
    };

    let currentLang = 'ru';

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('motto').innerText = translations[lang].motto;
        document.getElementById('mainBtn').innerText = translations[lang].btn;
        document.getElementById('refText').innerText = translations[lang].ref;
        document.getElementById('copyBtn').innerText = translations[lang].copy;
    }

    async function connectAndJoin() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const user = accounts[0];
                
                document.getElementById('status').innerText = translations[currentLang].status + user;
                document.getElementById('status').style.color = "#00ff00";

                // Показ реф-ссылки
                const refURL = window.location.origin + window.location.pathname + "?ref=" + user;
                document.getElementById('refBox').style.display = 'block';
                document.getElementById('refLink').innerText = refURL;

                console.log("MetaMask подключен. Контракт: 0x04400e4d39C539486cc644e95197119b720a8B17");
            } catch (err) {
                alert("Ошибка подключения: " + err.message);
            }
        } else {
            alert("Пожалуйста, установите MetaMask!");
        }
    }

    function copyRef() {
        const link = document.getElementById('refLink').innerText;
        navigator.clipboard.writeText(link);
        alert(translations[currentLang].alert);
    }
</script>
</body>
</html>
