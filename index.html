<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Infinity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #010a13; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; max-width: 800px; margin: 20px auto; }
        .card { border: 1px solid #0077be; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        .btn { background: #0077be; color: white; border: none; padding: 18px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn:hover { background: var(--accent); box-shadow: 0 0 20px var(--accent); color: black; }
        #status { color: var(--accent); margin: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>OCEAN INFINITY</h1>
    <p id="status">Кошелек не подключен</p>

    <div class="grid">
        <div class="card">Lvl 1: $10</div><div class="card">Lvl 2: $20</div><div class="card">Lvl 3: $30</div>
        <div class="card">Lvl 4: $45</div><div class="card">Lvl 5: $60</div><div class="card">Lvl 6: $80</div>
        <div class="card">Lvl 7: $100</div><div class="card">Lvl 8: $140</div><div class="card">Lvl 9: $180</div>
        <div class="card">Lvl 10: $240</div><div class="card">Lvl 11: $300</div><div class="card">Lvl 12: $380</div>
        <div class="card">Lvl 13: $480</div><div class="card">Lvl 14: $600</div><div class="card">Lvl 15: $750</div>
    </div>

    <button class="btn" onclick="joinFamily()">ВСТУПИТЬ В СЕМЬЮ</button>
</div>

<script>
    const CONTRACT_ADDR = "0x04400e4d39C539486cc644e95197119b720a8B17";
    const POLYGON_CHAIN_ID = '0x89';

    async function joinFamily() {
        if (!window.ethereum) return alert("MetaMask не найден");
        
        try {
            // Вызов окна MetaMask
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const chainId = await window.ethereum.request({ method: 'eth_chainId' });

            if (chainId !== POLYGON_CHAIN_ID) {
                alert("Переключитесь на сеть Polygon!");
                return;
            }

            document.getElementById('status').innerText = "Подключен: " + accounts[0];
            
            // Здесь должна быть функция покупки. 
            // Для этого мне нужно знать название функции в твоем смарт-контракте (например, register или buyLevel)
            console.log("Готов к транзакции на контракт:", CONTRACT_ADDR);
            
        } catch (err) {
            console.error(err);
        }
    }
</script>
</body>
</html>
