<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Infinity | Founder Board</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #010a13; --panel: #111a24; --gold: #ffaa00; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .logo { font-weight: bold; letter-spacing: 2px; color: var(--accent); }
        .lang-select button { background: none; border: 1px solid #333; color: #888; cursor: pointer; padding: 5px 10px; border-radius: 4px; }
        .lang-select button.active { border-color: var(--accent); color: white; }

        .container { max-width: 450px; margin: 20px auto; padding: 20px; }
        .stat-box { background: var(--panel); border: 1px dashed var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .quote-card { background: linear-gradient(135deg, #1e3a8a, #1e293b); border-radius: 15px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--accent); }
        .quote-card p { font-weight: bold; text-transform: uppercase; line-height: 1.4; margin: 0; }

        .info-row { background: var(--panel); border-radius: 10px; padding: 15px; display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 2px solid #0a1118; }
        .label { color: #888; font-weight: bold; }
        .value { color: var(--accent); font-weight: bold; }
        .value.max { color: var(--accent); }

        .ref-link { background: #0a1118; padding: 12px; border-radius: 8px; font-size: 0.8rem; color: var(--accent); word-break: break-all; margin-bottom: 10px; border: 1px solid #222; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px; font-size: 1rem; }
        .btn-copy { background: #3b424d; color: white; text-transform: uppercase; }
        .btn-founder { background: linear-gradient(to right, #f59e0b, #d97706); color: white; text-transform: uppercase; margin-top: 10px; }
        .btn-join { background: var(--accent); color: black; font-size: 1.2rem; }

        .footer-tag { color: var(--gold); font-size: 0.8rem; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        
        #cabinet { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">OCEAN INFINITY 🌊</div>
    <div class="lang-select">
        <button onclick="setLang('ru')" id="btn-ru" class="active">RU</button>
        <button onclick="setLang('en')" id="btn-en">EN</button>
        <button onclick="setLang('fr')" id="btn-fr">FR</button>
    </div>
</header>

<div class="container" id="welcome-screen">
    <div class="quote-card">
        <p id="main-quote">«ЗДЕСЬ ПЕЧАТАЮТ ДЕНЬГИ. ЗДЕСЬ СТРОЯТ ИМПЕРИИ. ТВОЯ СЕМЬЯ — ТВОЯ КРЕПОСТЬ!»</p>
    </div>
    <button class="btn btn-join" onclick="connectWallet()" id="connect-btn">ВСТУПИТЬ В СЕМЬЮ</button>
</div>

<div class="container" id="cabinet">
    <div class="stat-box">
        <span class="label" id="in-family-label">В СЕМЬЕ УЖЕ:</span> <span class="value">...</span>
    </div>

    <div class="quote-card">
        <p id="cabinet-quote">«ЗДЕСЬ ПЕЧАТАЮТ ДЕНЬГИ. ЗДЕСЬ СТРОЯТ ИМПЕРИИ. ТВОЯ СЕМЬЯ — ТВОЯ КРЕПОСТЬ!»</p>
    </div>

    <div class="info-row">
        <span class="label">ID:</span>
        <span class="value">1 (FOUNDER)</span>
    </div>

    <div class="info-row">
        <span class="label" id="level-label">УРОВЕНЬ:</span>
        <span class="value max">15 (MAX)</span>
    </div>

    <div class="ref-link" id="ref-url">https://oceanin.github.io/?ref=0x9f1...</div>

    <button class="btn btn-copy" onclick="copyLink()" id="copy-btn">КОПИРОВАТЬ ССЫЛКУ</button>

    <button class="btn btn-founder" id="founder-btn">УПРАВЛЕНИЕ FOUNDER №1</button>
    
    <div class="footer-tag" id="mode-tag">РЕЖИМ ОСНОВАТЕЛЯ АКТИВИРОВАН</div>
</div>

<script>
    const texts = {
        ru: {
            quote: "«ЗДЕСЬ ПЕЧАТАЮТ ДЕНЬГИ. ЗДЕСЬ СТРОЯТ ИМПЕРИИ. ТВОЯ СЕМЬЯ — ТВОЯ КРЕПОСТЬ!»",
            join: "ВСТУПИТЬ В СЕМЬЮ",
            infamily: "В СЕМЬЕ УЖЕ:",
            level: "УРОВЕНЬ:",
            copy: "КОПИРОВАТЬ ССЫЛКУ",
            founder: "УПРАВЛЕНИЕ FOUNDER №1",
            mode: "РЕЖИМ ОСНОВАТЕЛЯ АКТИВИРОВАН",
            copied: "Ссылка скопирована!"
        },
        en: {
            quote: "«MONEY IS PRINTED HERE. EMPIRES ARE BUILT HERE. YOUR FAMILY IS YOUR FORTRESS!»",
            join: "JOIN THE FAMILY",
            infamily: "ALREADY IN FAMILY:",
            level: "LEVEL:",
            copy: "COPY LINK",
            founder: "MANAGE FOUNDER #1",
            mode: "FOUNDER MODE ACTIVATED",
            copied: "Link copied!"
        },
        fr: {
            quote: "«ICI ON IMPRIME L'ARGENT. ICI ON CONSTRUIT DES EMPIRES. TA FAMILLE EST TA FORTERESSE!»",
            join: "REJOINDRE LA FAMILLE",
            infamily: "DÉJÀ DANS LA FAMILLE:",
            level: "NIVEAU:",
            copy: "COPIER LE LIEN",
            founder: "GÉRER FOUNDER №1",
            mode: "MODE FONDATEUR ACTIVÉ",
            copied: "Lien copié!"
        }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-select button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        
        document.getElementById('main-quote').innerText = texts[lang].quote;
        document.getElementById('cabinet-quote').innerText = texts[lang].quote;
        document.getElementById('connect-btn').innerText = texts[lang].join;
        document.getElementById('in-family-label').innerText = texts[lang].infamily;
        document.getElementById('level-label').innerText = texts[lang].level;
        document.getElementById('copy-btn').innerText = texts[lang].copy;
        document.getElementById('founder-btn').innerText = texts[lang].founder;
        document.getElementById('mode-tag').innerText = texts[lang].mode;
    }

    async function connectWallet() {
        if (window.ethereum) {
            try {
                const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                const user = accounts[0];
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('cabinet').style.display = 'block';
                document.getElementById('ref-url').innerText = window.location.origin + window.location.pathname + "?ref=" + user;
            } catch (err) {
                alert("Ошибка подключения");
            }
        } else {
            alert("Установите MetaMask!");
        }
    }

    function copyLink() {
        const link = document.getElementById('ref-url').innerText;
        navigator.clipboard.writeText(link);
        alert("OK!");
    }
</script>
</body>
</html>
